name: update-data
on:
  schedule:
    - cron: "15 */8 * * *"
  workflow_dispatch:
permissions:
  contents: write
concurrency:
  group: update
  cancel-in-progress: false
jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      - name: Run worker
        run: node worker.mjs
        env:
          YT_API_KEY: ${{ secrets.YT_API_KEY }}
          # GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}  # desactivado temporalmente (run solo-descubrimiento)
          # APIFY_TOKEN: ${{ secrets.APIFY_TOKEN }}  # desactivado temporalmente (run solo-descubrimiento)
      - name: Commit data
        run: |
          git config user.name "tracker-bot"
          git config user.email "bot@users.noreply.github.com"
          git add data/
          git diff --cached --quiet && echo "sin cambios" && exit 0
          git commit -m "data update $(date -u +%FT%TZ)"
          for i in $(seq 1 8); do
            git fetch origin main
            git merge -X ours -m "merge remoto (gana worker)" origin/main || true
            git push origin main && echo "push OK" && exit 0
            sleep $((RANDOM % 20 + 5))
          done
          echo "no se pudo pushear tras 8 intentos"; exit 1
